---
layout: default 
---
<article>
  <header>
    <h1>{{ page.title }}</h1>
    {% assign day = page.date | date: "%-d"  %}
    <time datetime="{{ page.date | date_to_xmlschema }}">
      {% case day %}
        {% when '1' or '21' or '31' %}{{ day }}st
        {% when '2' or '22' %}{{ day }}nd
        {% when '3' or '23' %}{{ day }}rd
        {% else %}{{ day }}th
      {% endcase %}
      {{ page.date | date: "of %B, %Y" }}
    </time>
  </header>
  {{content}}
</article>
